syntax = "proto3";

package physicsroom.splats;

message Splat {
  float x = 1;
  float y = 2;
  float z = 3;
  float scale = 4;
  uint32 r = 5;
  uint32 g = 6;
  uint32 b = 7;
  float opacity = 8;
}

message SplatCloud {
  repeated Splat splats = 1;
}

message StreamRequest {}

service PhysicsRoom {
  rpc StreamSplats(StreamRequest) returns (stream SplatCloud);
}
