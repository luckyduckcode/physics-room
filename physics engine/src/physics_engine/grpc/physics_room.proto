syntax = "proto3";

package physicsroom.v1;

import "google/protobuf/struct.proto";

message SessionConfig {
  string session_id = 1;
  string system_name = 15;
  uint32 N = 2;
  double dt = 3;
  double hbar = 4;
  double omega = 5;
  double phi = 6;
  double lam = 7;
  double kappa = 8;
  bool enable_ai = 9;
  bool use_real_modules = 10;
  uint64 seed = 11;
  uint32 grid_x = 12;
  uint32 grid_y = 13;
  uint32 grid_z = 14;
}

message RunMetadata {
  string config_hash = 1;
  string code_version = 2;
  uint64 seed = 3;
  int64 created_at_ns = 4;
}

message StartSessionRequest {
  SessionConfig config = 1;
}

message SessionState {
  string session_id = 1;
  uint32 tick = 2;
  uint32 active_voxels = 3;
  uint32 stable_voxels = 4;
  double last_energy = 5;
  RunMetadata metadata = 6;
  google.protobuf.Struct taxonomy = 7;
}

message StartSessionResponse {
  bool ok = 1;
  string session_id = 2;
  SessionState state = 3;
  RunMetadata metadata = 4;
  google.protobuf.Struct taxonomy = 5;
}

message TickRunRequest {
  string session_id = 1;
  uint32 steps = 2;
}

message EventEnvelope {
  string timestamp = 1;
  string session_id = 2;
  string source = 3;
  string event_type = 4;
  uint64 sequence = 5;
  google.protobuf.Struct payload = 6;
}

message TickRunResponse {
  bool ok = 1;
  string session_id = 2;
  uint32 steps = 3;
  uint32 final_tick = 4;
  repeated EventEnvelope events = 5;
  RunMetadata metadata = 6;
}

message GetSessionStateRequest {
  string session_id = 1;
}

message GetSessionStateResponse {
  bool ok = 1;
  SessionState state = 2;
}

message GetSessionEventsRequest {
  string session_id = 1;
  uint64 after_sequence = 2;
  uint32 limit = 3;
}

message GetSessionEventsResponse {
  bool ok = 1;
  string session_id = 2;
  repeated EventEnvelope events = 3;
}

service PhysicsRoomService {
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  rpc TickRun(TickRunRequest) returns (TickRunResponse);
  rpc GetSessionState(GetSessionStateRequest) returns (GetSessionStateResponse);
  rpc GetSessionEvents(GetSessionEventsRequest) returns (GetSessionEventsResponse);
  rpc StreamEvents(GetSessionEventsRequest) returns (stream EventEnvelope);
}
