# Nginx full site config for game_module with TLS (Let's Encrypt)
# Replace `your-domain.example.com` with your real domain.
server {
    listen 80;
    server_name your-domain.example.com;

    # Redirect HTTP -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name your-domain.example.com;

    # Certbot will populate these if you use --nginx
    ssl_certificate /etc/letsencrypt/live/your-domain.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 4M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (tune for your workload)
        proxy_connect_timeout 60s;
        proxy_read_timeout 180s;
        proxy_send_timeout 60s;

        # Buffers
        proxy_buffering on;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;

        # Pass large bodies through (we also enforce at app level)
        client_body_timeout 60s;
    }
}
